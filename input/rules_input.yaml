release_id: R20260324
rules:
  - rule_id: R001
    rule_name: 不全相同判定
    source_table: rule_test_core_yanfei02
    target_field: pay_channel
    expression: IsNotAllTheSame(pay_channel)=1
    semantics:
      empty_values: ["", "空"]
      null_values_not_empty: [null, "NULL"]
      case_sensitive: true
    description: "rule_test_core_yanfei02.pay_channel 不允许全部数据相同"
  - rule_id: R002
    rule_name: 非空校验
    source_table: transaction_detail_test02
    target_field: product_name
    expression: IsNotNull(product_name)=1
    semantics:
      empty_values: ["", "空"]
      null_values_not_empty: [null, "NULL"]
      case_sensitive: true
    description: "transaction_detail_test02.product_name 必须非空"
  - rule_id: R003
    rule_name: 长度校验
    source_table: transaction_detail_test02
    target_field: sku_code
    expression: LengthBetween(sku_code,1,20)=1
    semantics:
      case_sensitive: true
    description: "transaction_detail_test02.sku_code 长度需在 1-20"
  - rule_id: R004
    rule_name: 枚举校验
    source_table: rule_test_core_yanfei02
    target_field: pay_channel
    expression: InEnum(pay_channel,alipay,wechat,bank)=1
    semantics:
      case_sensitive: true
    description: "pay_channel 必须在枚举范围内"
  - rule_id: R005
    exec_rule_id: 4ade39c90f7b96c1f669eb91a98d6c66
    rule_name: 非空判定（组合）
    source_table: transaction_detail_test02
    target_field: product_name,sku_code
    expression: IsNotNullComb(product_name,sku_code)=1
    semantics:
      empty_values: ["", "空"]
      null_values_not_empty: [null, "NULL"]
      case_sensitive: true
    description: "transaction_detail_test02.product_name + transaction_detail_test02.sku_code 至少一个非空"
